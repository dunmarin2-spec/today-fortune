<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇰🇷 북측 특송: 오늘의 운세</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        /* 형님이 좋아하시는 깔끔한 화이트 배경 세팅 */
        :root { --point-color: #d63031; --bg-color: #ffffff; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #2d3436; }

        .container { width: 90%; max-width: 400px; background: white; padding: 40px 30px; border-radius: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); text-align: center; border: 2px solid #f1f2f6; }
        
        .header-badge { background: var(--point-color); color: white; padding: 5px 15px; border-radius: 50px; font-weight: 800; font-size: 0.8rem; display: inline-block; margin-bottom: 15px; }
        
        h1 { font-size: 1.8rem; font-weight: 900; margin-bottom: 10px; line-height: 1.3; }
        h1 span { color: var(--point-color); }
        
        .desc { color: #636e72; font-size: 0.95rem; margin-bottom: 30px; }

        /* 운세 결과창 */
        #result-box { display: none; margin-top: 20px; padding: 25px; background: #fff5f5; border-radius: 20px; border: 1px dashed var(--point-color); animation: fadeIn 0.5s ease; }
        .result-title { font-weight: 800; color: var(--point-color); font-size: 1.2rem; margin-bottom: 10px; }
        .result-text { font-size: 1.1rem; line-height: 1.6; font-weight: 600; color: #2d3436; word-break: keep-all; }

        /* 버튼 스타일 */
        button { width: 100%; background: var(--point-color); color: white; border: none; padding: 20px; border-radius: 15px; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(214, 48, 49, 0.3); margin-top: 20px; }
        button:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(214, 48, 49, 0.4); }
        button:active { transform: scale(0.98); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .footer { margin-top: 30px; font-size: 0.8rem; color: #b2bec3; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-badge">제1호 특별 보도</div>
        <h1>동무의 <span>오늘 운세</span>를<br>알려주갔습네다!</h1>
        <p class="desc">버튼을 눌러 공화국의 축복을 확인하십쇼!</p>

        <div id="result-box">
            <div class="result-title">📢 긴급 보도문</div>
            <div id="fortune-text" class="result-text"></div>
        </div>

        <button onclick="getFortune()">운세 확인하기 (딸깍!)</button>

        <div class="footer">© 2026 공화국 운세국 본부</div>
    </div>

    <script>
        // 북한 아나운서 말투가 살아있는 운세 리스트
        const fortunes = [
            "동무! 오늘 남쪽에서 귀인이 올라와 고구마를 건넬 운세입네다! 기쁘게 받으십쇼!",
            "오늘은 대길입네다! 길을 걷다 쌀 한 가마니를 줍는 격이니 어깨를 당당히 펴고 걸으십쇼!",
            "일없습네다! 오늘 어떤 난관이 닥쳐도 동무의 굳센 의지로 다 물리칠 수 있습네다!",
            "혁명적인 하루가 될 것입네다! 특히 점심 식사 메뉴 선택에서 승리할 운세입네다!",
            "동무, 오늘은 말조심하십쇼! 옆집 순이가 동무의 비밀을 캐려 눈을 부라리고 있습네다!",
            "오늘의 행운의 색은 붉은색입네다! 붉은색 옷을 입고 전진, 또 전진하십쇼!",
            "동무의 열정이 폭포수처럼 쏟아지는 날입네다! 그 기세로 오늘 할 일을 다 끝내버리십쇼!",
            "오늘은 잠시 쉬어가도 좋습네다. 강성대국도 잠은 자야 만드는 법 아니갔습네다?",
            "동무! 오늘 뜻밖의 장소에서 동지를 만나 술 한잔 기울일 기막힌 운세입네다!",
            "오늘은 만사형통입네다! 동무가 가는 길마다 꽃길이 펼쳐질 것이니 걱정 마십쇼!"
        ];

        function getFortune() {
            const resultBox = document.getElementById('result-box');
            const fortuneText = document.getElementById('fortune-text');
            
            // 랜덤으로 하나 뽑기
            const randomIndex = Math.floor(Math.random() * fortunes.length);
            
            // 화면에 보여주기
            fortuneText.innerText = fortunes[randomIndex];
            resultBox.style.display = 'block';

            // 버튼 텍스트 변경 (다시 뽑기)
            document.querySelector('button').innerText = "다시 보도받기 (딸깍!)";
        }
    </script>
</body>
</html>
