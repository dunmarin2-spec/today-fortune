<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇰🇷 리춘희의 무한 보도: 오늘의 운세</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗣️</text></svg>">
    <style>
        :root { --point-color: #d63031; --bg-color: #ffffff; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }

        .container { width: 90%; max-width: 400px; background: white; padding: 30px; border-radius: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); text-align: center; border: 1px solid #f1f2f6; }
        
        /* 리춘희 애니메이션 영역 */
        .lee-box { position: relative; width: 150px; height: 150px; margin: 0 auto 20px; overflow: hidden; border-radius: 50%; border: 4px solid var(--point-color); background: #eee; }
        .lee-img { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: none; }
        .lee-img.active { display: block; }

        h1 { font-size: 1.6rem; font-weight: 900; margin-bottom: 20px; color: #2d3436; }
        h1 span { color: var(--point-color); }

        #result-box { display: none; margin-top: 15px; padding: 20px; background: #fff5f5; border-radius: 15px; border: 1px dashed var(--point-color); animation: fadeIn 0.4s ease; }
        .result-text { font-size: 1.1rem; font-weight: 700; color: #2d3436; line-height: 1.5; word-break: keep-all; }

        button { width: 100%; background: var(--point-color); color: white; border: none; padding: 18px; border-radius: 15px; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 15px rgba(214, 48, 49, 0.3); margin-top: 15px; }
        button:active { transform: scale(0.98); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="lee-box">
            <img src="lee_close.png" id="img-close" class="lee-img active">
            <img src="lee_open.png" id="img-open" class="lee-img">
        </div>

        <h1>🇰🇷 리춘희의<br><span>오늘의 운세</span> 보도</h1>

        <div id="result-box">
            <div id="fortune-text" class="result-text"></div>
        </div>

        <button onclick="showFortune()">보도 시작하라우! (딸깍)</button>
    </div>

    <script>
        // 1. 입 벙긋 애니메이션 (0.2초마다 교체)
        const closeImg = document.getElementById('img-close');
        const openImg = document.getElementById('img-open');
        
        setInterval(() => {
            closeImg.classList.toggle('active');
            openImg.classList.toggle('active');
        }, 200); // 0.2초 간격으로 입을 벙긋거립니다

        // 2. 운세 데이터
        const fortunes = [
            "동무! 오늘 남쪽에서 귀인이 고구마를 건넬 운세입네다!",
            "오늘은 대길입네다! 쌀 한 가마니를 줍는 격이니 어깨를 펴십쇼!",
            "일없습네다! 어떤 난관도 동무의 의지로 물리칠 수 있습네다!",
            "혁명적인 하루입네다! 점심 메뉴 선택에서 대승리할 운세!",
            "동무, 오늘 행운의 색은 붉은색! 전진, 또 전진하십쇼!",
            "강성대국도 잠은 자야 만드는 법! 오늘은 푹 쉬는 날입네다."
        ];

        function showFortune() {
            const text = document.getElementById('fortune-text');
            const box = document.getElementById('result-box');
            text.innerText = fortunes[Math.floor(Math.random() * fortunes.length)];
            box.style.display = 'block';
        }
    </script>
</body>
</html>
